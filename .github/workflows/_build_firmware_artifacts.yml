name: Build Firmware Artifacts

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - project: air_firmware_esp32c5
            artifact_suffix: ""
            build_flags: ""
          - project: air_firmware_esp32c5
            artifact_suffix: "-apfpv"
            build_flags: "-DAPFPV_FIRMWARE"
          - project: air_firmware_esp32cam
            artifact_suffix: ""
            build_flags: ""
          - project: air_firmware_esp32cam
            artifact_suffix: "-apfpv"
            build_flags: "-DAPFPV_FIRMWARE"
          - project: air_firmware_esp32s3sense
            artifact_suffix: ""
            build_flags: ""
          - project: air_firmware_esp32s3sense
            artifact_suffix: "-apfpv"
            build_flags: "-DAPFPV_FIRMWARE"
          - project: air_firmware_esp32s3sense_ov5640
            artifact_suffix: ""
            build_flags: ""
          - project: air_firmware_esp32s3sense_ov5640
            artifact_suffix: "-apfpv"
            build_flags: "-DAPFPV_FIRMWARE"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install required Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools

      - name: Install PlatformIO latest
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio esptool

      - name: Verify toolchain versions
        run: |
          python --version
          python -m platformio --version
          python -m esptool version

      - name: Get version
        id: version
        run: |
          fw=$(grep '#define FW_VERSION' components/common/packets.h | sed 's/.*"\(.*\)".*/\1/')
          pkt=$(grep -oP '(?<=#define PACKET_VERSION\s)\d+' components/common/fec.h)
          echo "version=$fw.$pkt" >> $GITHUB_OUTPUT

      - name: Build firmware
        env:
          PLATFORMIO_BUILD_FLAGS: ${{ matrix.build_flags }}
        run: |
          python -m platformio run -d ${{ matrix.project }}

      - name: Package firmware artifacts
        run: |
          python .github/scripts/package_firmware.py \
            --project "${{ matrix.project }}" \
            --suffix "${{ matrix.artifact_suffix }}" \
            --version "${{ steps.version.outputs.version }}" \
            --output-dir "firmware_artifacts/${{ matrix.project }}${{ matrix.artifact_suffix }}"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}${{ matrix.artifact_suffix }}
          path: firmware_artifacts/${{ matrix.project }}${{ matrix.artifact_suffix }}/*
          if-no-files-found: error
