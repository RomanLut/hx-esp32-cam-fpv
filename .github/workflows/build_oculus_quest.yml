name: Build Oculus Quest GS

on:
  push:
    branches:
      - master
      - development
  workflow_dispatch:

jobs:
  build-opencv-wrapper:
    name: Build OpenCV Wrapper (Android arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch pinned OpenCV tag
        run: git -C OpenCV/OpenCV fetch --force --depth=1 origin refs/tags/4.13.0:refs/tags/4.13.0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Android build tools
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Build OpenCV Wrapper
        env:
          ANDROID_ABI: arm64-v8a
          ANDROID_MIN_SDK: "23"
        run: bash OpenCV/OpenCVWrapper/scripts/build_android.sh

      - name: Upload prebuilt
        uses: actions/upload-artifact@v4
        with:
          name: opencv-wrapper-android-arm64-v8a
          path: OpenCV/OpenCVWrapper/Prebuilt/android/arm64-v8a/
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: build-opencv-wrapper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download OpenCV Wrapper prebuilt
        uses: actions/download-artifact@v4
        with:
          name: opencv-wrapper-android-arm64-v8a
          path: OpenCV/OpenCVWrapper/Prebuilt/android/arm64-v8a/

      - name: Build debug APK
        run: |
          cd oculus_quest_gs
          sed -i '/org.gradle.java.home/d' gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv oculus_quest_gs/app/build/outputs/apk/debug/app-debug.apk \
             oculus_quest_gs/app/build/outputs/apk/debug/hx-esp32-cam-fpv-oculus-0.5.3.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hx-esp32-cam-fpv-oculus-0.5.3
          path: oculus_quest_gs/app/build/outputs/apk/debug/hx-esp32-cam-fpv-oculus-0.5.3.apk
