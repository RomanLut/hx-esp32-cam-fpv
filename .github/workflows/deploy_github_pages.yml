name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "web/**"
      - "tools/ov*_pclk_calculator/**"
      - ".github/workflows/deploy_github_pages.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag or release URL to publish on Pages. Leave empty to use the latest release."
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Validate vendored ESP Web Tools
        run: |
          test -s web/espwebtool/install-button.js
          test -n "$(find web/espwebtool -maxdepth 1 -name 'stub_flasher_32c5-*.js' -print -quit)"
          if grep -q "unpkg.com/esp-web-tools" web/install.html; then
            echo "web/install.html must use the vendored ESP Web Tools bundle" >&2
            exit 1
          fi

      - name: Resolve release tag
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$INPUT_RELEASE_TAG" ]; then
            tag="${INPUT_RELEASE_TAG%/}"
            tag="${tag##*/}"
          else
            tag="$(gh release view --json tagName --jq '.tagName')"
          fi
          echo "release_tag=$tag" >> "$GITHUB_ENV"
          echo "Deploying release $tag"

      - name: Prepare Pages payload
        run: |
          mkdir -p pages_payload
          cp -R web/. pages_payload/
          mkdir -p pages_payload/tools
          cp -R tools/ov*_pclk_calculator pages_payload/tools/

      - name: Download release firmware zip files
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release_firmware_zips
          gh release download "$release_tag" \
            --pattern "air_firmware_*.zip" \
            --dir release_firmware_zips

      - name: Extract firmware files for ESP Web Tools
        continue-on-error: true
        run: |
          python .github/scripts/extract_pages_firmware.py \
            --zip-dir release_firmware_zips \
            --output-dir "pages_payload/firmware/$release_tag"

      - name: Create release asset list
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/releases/tags/$release_tag" \
            --jq '[.assets[] | {name: .name, browser_download_url: .browser_download_url}]' > release_assets.json

      - name: Create release asset catalog
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 30 --json tagName \
            --jq '.[].tagName' > release_tags.txt
          echo "[]" > release_asset_catalog.json
          while IFS= read -r tag; do
            gh api "repos/${{ github.repository }}/releases/tags/$tag" \
              --jq '{tagName: .tag_name, assets: [.assets[] | {name: .name, browser_download_url: .browser_download_url}]}' > release_asset_entry.json
            jq -s '.[0] + [.[1]]' release_asset_catalog.json release_asset_entry.json > release_asset_catalog_next.json
            mv release_asset_catalog_next.json release_asset_catalog.json
          done < release_tags.txt

      - name: Populate landing page download links
        continue-on-error: true
        run: |
          python .github/scripts/populate_landing_page.py \
            --index pages_payload/index.html \
            --firmware-dir "pages_payload/firmware/$release_tag" \
            --repository "${{ github.repository }}" \
            --owner "${{ github.repository_owner }}" \
            --tag "$release_tag" \
            --asset-list release_assets.json \
            --release-asset-catalog release_asset_catalog.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages_payload

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
