name: Build Android APK

on:
  push:
    branches:
      - master
      - development
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Get version name
      id: version
      run: |
        fw=$(grep '#define FW_VERSION' components/common/packets.h | sed 's/.*"\(.*\)".*/\1/')
        pkt=$(grep '#define PACKET_VERSION' components/common/fec.h | awk '{print $3}')
        echo "version=$fw.$pkt" >> $GITHUB_OUTPUT

    - name: Build debug APK
      run: |
        cd android_gs
        sed -i '/org.gradle.java.home/d' gradle.properties
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Rename APK
      run: |
        mv android_gs/app/build/outputs/apk/debug/app-debug.apk \
           android_gs/app/build/outputs/apk/debug/hx-esp32-cam-fpv-${{ steps.version.outputs.version }}.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: hx-esp32-cam-fpv-${{ steps.version.outputs.version }}
        path: android_gs/app/build/outputs/apk/debug/hx-esp32-cam-fpv-${{ steps.version.outputs.version }}.apk
