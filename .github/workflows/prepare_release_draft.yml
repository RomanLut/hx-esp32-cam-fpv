name: Prepare Release Draft

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  firmware:
    uses: ./.github/workflows/_build_firmware_artifacts.yml

  build-opencv-wrapper:
    name: Build OpenCV Wrapper (Android arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch pinned OpenCV tag
        run: git -C OpenCV/OpenCV fetch --force --depth=1 origin refs/tags/4.13.0:refs/tags/4.13.0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Android build tools
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Build OpenCV Wrapper
        env:
          ANDROID_ABI: arm64-v8a
          ANDROID_MIN_SDK: "23"
        run: bash OpenCV/OpenCVWrapper/scripts/build_android.sh

      - name: Upload prebuilt
        uses: actions/upload-artifact@v4
        with:
          name: opencv-wrapper-android-arm64-v8a
          path: OpenCV/OpenCVWrapper/Prebuilt/android/arm64-v8a/
          if-no-files-found: error

  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-opencv-wrapper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download OpenCV Wrapper prebuilt
        uses: actions/download-artifact@v4
        with:
          name: opencv-wrapper-android-arm64-v8a
          path: OpenCV/OpenCVWrapper/Prebuilt/android/arm64-v8a/

      - name: Get version name
        id: version
        run: |
          fw=$(grep '#define FW_VERSION' components/common/packets.h | sed 's/.*"\(.*\)".*/\1/')
          pkt=$(grep -oP '(?<=#define PACKET_VERSION\s)\d+' components/common/fec.h)
          echo "version=$fw.$pkt" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: |
          cd android_gs
          sed -i '/org.gradle.java.home/d' gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android_gs/app/build/outputs/apk/debug/app-debug.apk \
             android_gs/app/build/outputs/apk/debug/hx-esp32-cam-fpv-${{ steps.version.outputs.version }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-gs-apk
          path: android_gs/app/build/outputs/apk/debug/hx-esp32-cam-fpv-${{ steps.version.outputs.version }}.apk
          if-no-files-found: error

  oculus-quest-apk:
    name: Build Oculus Quest APK
    runs-on: ubuntu-latest
    needs: build-opencv-wrapper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download OpenCV Wrapper prebuilt
        uses: actions/download-artifact@v4
        with:
          name: opencv-wrapper-android-arm64-v8a
          path: OpenCV/OpenCVWrapper/Prebuilt/android/arm64-v8a/

      - name: Get version name
        id: version
        run: |
          fw=$(grep '#define FW_VERSION' components/common/packets.h | sed 's/.*"\(.*\)".*/\1/')
          pkt=$(grep -oP '(?<=#define PACKET_VERSION\s)\d+' components/common/fec.h)
          echo "version=$fw.$pkt" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: |
          cd oculus_quest_gs
          sed -i '/org.gradle.java.home/d' gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv oculus_quest_gs/app/build/outputs/apk/debug/app-debug.apk \
             oculus_quest_gs/app/build/outputs/apk/debug/hx-esp32-cam-fpv-oculus-${{ steps.version.outputs.version }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: oculus-quest-gs-apk
          path: oculus_quest_gs/app/build/outputs/apk/debug/hx-esp32-cam-fpv-oculus-${{ steps.version.outputs.version }}.apk
          if-no-files-found: error

  release:
    name: Create Draft Release
    needs:
      - firmware
      - android-apk
      - oculus-quest-apk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_payload
          pattern: "air_firmware_*"
          merge-multiple: true

      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-gs-apk
          path: release_payload

      - name: Download Oculus Quest APK artifact
        uses: actions/download-artifact@v4
        with:
          name: oculus-quest-gs-apk
          path: release_payload

      - name: Create release tag
        run: echo "tag=release-$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Generate release body
        run: |
          python .github/scripts/generate_release_body.py \
            --payload-dir release_payload \
            --repository "${{ github.repository }}" \
            --owner "${{ github.repository_owner }}" \
            --tag "${{ env.tag }}" \
            --output release_body.md

      - name: Create GitHub draft release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.tag }}
          name: Release ${{ env.tag }}
          draft: true
          body_path: release_body.md
          files: release_payload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
